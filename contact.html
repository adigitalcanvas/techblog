<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact Me</title>
    <style>
    .main-header {
    position: absolute; /* Stays at the top even if you scroll */
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: flex-end; /* Aligns link to the right */
    padding: 40px 15% 0;
    box-sizing: border-box;
    }

    .home_link {
    text-decoration: none;
    color: #1a1a1a;
    font-size: 18px;
    font-weight: 500;
    padding-bottom: 4px;
}
        body {
           font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ccc7c7;
        }

        
    

        .contact-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            z-index: 1;
            margin-top: 40px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #1a1a1a;
            text-align: center;
            font-size: 24px;
        }

        form {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        input, 
        textarea, 
        button {
            width: 100%; 
            box-sizing: border-box; 
            margin-bottom: 20px;
            padding: 14px;
            border: 1.5px solid #e1e1e1;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
        }

        button {
            background-color: #4f46e5;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0;
            font-size: 18px;
        }

        button:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }



   
    </style>
</head>
<body>
   
<header class="main-header">
    <nav>
    <a href="https://adigitalcanvas.github.io/techblog/" class="home_link">Home</a>
    </nav>
</header>

<div class="contact-container">

    <h2>Send a Message</h2>
    
    <form id="form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="1dc18d09-3194-4f40-b484-af7b3500cdca">
        <input type="hidden" name="subject" value="New Submission from GitHub Pages">
        <input type="checkbox" name="botcheck" class="hidden" style="display:none">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <textarea name="message" placeholder="Message" required></textarea>
        
        <button type="submit">Submit Form</button>
    </form>
</div>

<script>
    window.onload = function() {
        document.getElementById("form").reset();
    };
</script>
</body>
</html>
